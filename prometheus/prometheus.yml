# prometheus.yml : Configuration de Prometheus
# Chargé au démarrage. Tout changement nécessite un restart du conteneur.

# ─────────────────────────────────────────────────────────────────────────────
# GLOBAL
# ─────────────────────────────────────────────────────────────────────────────
global:
  scrape_interval: 15s       # Fréquence de collecte des métriques
  evaluation_interval: 15s   # Fréquence d'évaluation des règles d'alerte

# ─────────────────────────────────────────────────────────────────────────────
# CIBLES DE SCRAPING
# ─────────────────────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus se scrape lui-même pour exposer ses propres métriques internes
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # cAdvisor : métriques des conteneurs Docker (CPU, mémoire, réseau, I/O)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # Node Exporter : métriques de la machine hôte (CPU, RAM, disque, réseau)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]